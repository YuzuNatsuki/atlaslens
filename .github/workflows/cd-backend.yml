name: cd-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/**"
      - "infra/prompt_flow/**"
      - ".github/workflows/cd-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-backend
  cancel-in-progress: false

env:
  RG: atlaslens-rg
  REGISTRY: atlaslensacr${{ github.repository_owner }}    # overridden below from secrets
  IMAGE: atlaslens-backend
  APP: atlaslens-backend

jobs:
  build-and-deploy:
    name: build + push + update
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR + tag
        id: vars
        run: |
          ACR=$(az acr list -g "${{ env.RG }}" --query "[0].name" -o tsv)
          LOGIN=$(az acr show -n "$ACR" --query loginServer -o tsv)
          TAG=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "acr=$ACR" >> "$GITHUB_OUTPUT"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build + push via ACR Tasks (no local Docker needed)
        run: |
          az acr build \
            --registry "${{ steps.vars.outputs.acr }}" \
            --image "${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}" \
            --image "${{ env.IMAGE }}:latest" \
            --file backend/Dockerfile \
            .

      - name: Sync GitHub-managed secrets to Container App
        # JWT_SECRET is required in production (APP_ENV=container). If it's
        # missing, the new revision fails to boot and traffic stays on the
        # stale revision. We sync DEMO_PASSWORD here too so demo accounts work.
        run: |
          SECRET_ARGS=()
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            SECRET_ARGS+=(jwt-secret="${{ secrets.JWT_SECRET }}")
          fi
          if [ -n "${{ secrets.DEMO_PASSWORD }}" ]; then
            SECRET_ARGS+=(demo-password="${{ secrets.DEMO_PASSWORD }}")
          fi
          if [ ${#SECRET_ARGS[@]} -gt 0 ]; then
            az containerapp secret set \
              -g "${{ env.RG }}" -n "${{ env.APP }}" \
              --secrets "${SECRET_ARGS[@]}"
          else
            echo "::warning::Neither JWT_SECRET nor DEMO_PASSWORD GitHub secret is set; relying on whatever is already on the Container App."
          fi

      - name: Update Container App image + env bindings
        # --set-env-vars is incremental: it only updates the listed vars and
        # leaves the rest untouched, so it's safe to list both JWT_SECRET and
        # DEMO_PASSWORD here even if one of the GitHub secrets is empty.
        run: |
          ENV_ARGS=(JWT_SECRET=secretref:jwt-secret DEMO_PASSWORD=secretref:demo-password)
          if [ -z "${{ secrets.DEMO_PASSWORD }}" ]; then
            echo "::warning::DEMO_PASSWORD GitHub secret is empty; demo accounts won't work until you set it."
          fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "::warning::JWT_SECRET GitHub secret is empty; relying on the existing Container App secret if any."
          fi
          az containerapp update \
            -g "${{ env.RG }}" -n "${{ env.APP }}" \
            --image "${{ steps.vars.outputs.login }}/${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}" \
            --set-env-vars "${ENV_ARGS[@]}"

      - name: Smoke test
        run: |
          URL=$(az containerapp show -g "${{ env.RG }}" -n "${{ env.APP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend URL: https://$URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/")
            echo "  attempt $i: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Backend never returned 200" >&2
          exit 1
