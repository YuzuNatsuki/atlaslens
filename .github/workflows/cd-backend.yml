name: cd-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/**"
      - "infra/prompt_flow/**"
      - ".github/workflows/cd-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-backend
  cancel-in-progress: false

env:
  RG: atlaslens-rg
  REGISTRY: atlaslensacr${{ github.repository_owner }}    # overridden below from secrets
  IMAGE: atlaslens-backend
  APP: atlaslens-backend

jobs:
  build-and-deploy:
    name: build + push + update
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR + tag
        id: vars
        run: |
          ACR=$(az acr list -g "${{ env.RG }}" --query "[0].name" -o tsv)
          LOGIN=$(az acr show -n "$ACR" --query loginServer -o tsv)
          TAG=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "acr=$ACR" >> "$GITHUB_OUTPUT"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build + push via ACR Tasks (no local Docker needed)
        run: |
          az acr build \
            --registry "${{ steps.vars.outputs.acr }}" \
            --image "${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}" \
            --image "${{ env.IMAGE }}:latest" \
            --file backend/Dockerfile \
            .

      - name: Update Container App image
        run: |
          az containerapp update \
            -g "${{ env.RG }}" -n "${{ env.APP }}" \
            --image "${{ steps.vars.outputs.login }}/${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}"

      - name: Smoke test
        run: |
          URL=$(az containerapp show -g "${{ env.RG }}" -n "${{ env.APP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Backend URL: https://$URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/")
            echo "  attempt $i: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Backend never returned 200" >&2
          exit 1
