name: cd-frontend

# Frontend deploys to Azure Container Apps (nginx + Vite build).
# The Static Web App is no longer the deployment target — see
# docs/RUNBOOK.md for the migration notes.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/cd-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-frontend
  cancel-in-progress: false

env:
  RG: atlaslens-rg
  BACKEND_APP: atlaslens-backend
  FRONTEND_APP: atlaslens-web
  IMAGE: atlaslens-frontend

jobs:
  build-and-deploy:
    name: build + push + update Container App
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR + tag + backend URL
        id: vars
        run: |
          ACR=$(az acr list -g "${{ env.RG }}" --query "[0].name" -o tsv)
          LOGIN=$(az acr show -n "$ACR" --query loginServer -o tsv)
          TAG=$(echo "${{ github.sha }}" | cut -c1-12)
          BACKEND_FQDN=$(az containerapp show -g "${{ env.RG }}" -n "${{ env.BACKEND_APP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "acr=$ACR"             >> "$GITHUB_OUTPUT"
          echo "login=$LOGIN"         >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "backend=https://$BACKEND_FQDN" >> "$GITHUB_OUTPUT"

      - name: Build + push frontend image via ACR Tasks
        run: |
          az acr build \
            --registry "${{ steps.vars.outputs.acr }}" \
            --image "${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}" \
            --image "${{ env.IMAGE }}:latest" \
            --file frontend/Dockerfile \
            .

      - name: Ensure frontend Container App exists
        id: ensure_app
        run: |
          if ! az containerapp show -g "${{ env.RG }}" -n "${{ env.FRONTEND_APP }}" >/dev/null 2>&1; then
            echo "Frontend Container App does not exist yet — bootstrap it via 'terraform apply' (cd-infra)." >&2
            exit 1
          fi

      - name: Update frontend Container App image
        run: |
          az containerapp update \
            -g "${{ env.RG }}" -n "${{ env.FRONTEND_APP }}" \
            --image "${{ steps.vars.outputs.login }}/${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}" \
            --set-env-vars BACKEND_URL=${{ steps.vars.outputs.backend }} PORT=8080

      - name: Smoke test
        run: |
          URL=$(az containerapp show -g "${{ env.RG }}" -n "${{ env.FRONTEND_APP }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Frontend URL: https://$URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/healthz")
            echo "  attempt $i: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Frontend never returned 200" >&2
          exit 1
